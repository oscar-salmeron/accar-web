<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio de Personajes - ACCAR</title>
    <style>
        body {
            background: linear-gradient(180deg, #02040a 0%, #050b1a 100%);
            min-height: 100vh;
            margin: 0;
            padding: 80px 20px;
            color: #f5f2eb;
            font-family: Georgia, "Times New Roman", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .accar-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .accar-kicker {
            display: inline-block;
            font-family: sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #D4AF37;
            text-transform: uppercase;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 5px;
        }

        .accar-title {
            font-size: 42px;
            font-weight: normal;
            color: #ffffff;
            margin: 10px 0 0 0;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        .accar-divider {
            width: 60px;
            height: 2px;
            background: #D4AF37;
            margin: 20px auto 0;
            box-shadow: 0 0 10px #D4AF37;
        }

        .accar-grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1000px;
            justify-items: center;
        }

        .accar-portrait-card {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease, filter 0.3s ease;
            width: 100%;
            max-width: 250px;
        }

        .accar-portrait-card:hover {
            transform: translateY(-5px);
            filter: drop-shadow(0 10px 20px rgba(212, 175, 55, 0.2));
        }

        .portrait-frame {
            width: 100%;
            aspect-ratio: 2 / 3;
            overflow: hidden;
            border-radius: 4px;
            border: 2px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 8px 20px rgba(0,0,0,0.8);
            margin-bottom: 15px;
            background: #02040a;
        }

        .portrait-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            transition: transform 0.5s ease;
        }

        .accar-portrait-card:hover .portrait-frame img {
            transform: scale(1.05);
        }

        .portrait-name {
            font-size: 24px;
            color: #D4AF37;
            font-weight: normal;
            margin: 0;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
            text-align: center;
            border-bottom: 1px solid transparent;
            padding-bottom: 5px;
            transition: border-color 0.3s ease;
        }

        .accar-portrait-card:hover .portrait-name {
            border-color: rgba(212, 175, 55, 0.5);
        }

        .loading-text {
            color: #D4AF37;
            font-family: sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="accar-header">
        <span class="accar-kicker">Historia de la Salvación</span>
        <h1 class="accar-title">Directorio de Personajes</h1>
        <div class="accar-divider"></div>
    </div>

    <!-- Contenedor donde Firebase inyectará las tarjetas -->
    <div id="galeria-personajes" class="accar-grid-container">
        <p class="loading-text" id="mensaje-carga">Conectando con el archivo eclesial...</p>
    </div>

    <!-- SDK de Firebase modular (CDN) -->
    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Configuración exacta
        const firebaseConfig = {
            apiKey: "AIzaSyDSCSWYM5dgkIfVK-uBe1oWkeU7se4fvFg",
            authDomain: "accar-web.firebaseapp.com",
            projectId: "accar-web",
            storageBucket: "accar-web.firebasestorage.app",
            messagingSenderId: "249370548582",
            appId: "1:249370548582:web:6b35298df41771113910a7"
        };

        // Solución SPA: Verifica si Firebase ya está conectado antes de inicializarlo
        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
        const db = getFirestore(app);

        async function cargarPersonajes() {
            const contenedor = document.getElementById('galeria-personajes');
            const mensajeCarga = document.getElementById('mensaje-carga');

            try {
                // Hacemos la consulta a la colección exacta que creamos
                const querySnapshot = await getDocs(collection(db, "directorio_biblico", "personajes", "registros"));
                let htmlContent = "";

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const imagen = data.imagen_path || "../../assets/img/logo-accar.png";
                    
                    htmlContent += `
                        <a href="#" onclick="event.preventDefault(); window.currentPersonajeId = '${doc.id}'; loadView('/views/directorio_biblico/personaje.html');" class="accar-portrait-card">
                            <div class="portrait-frame">
                                <img src="${imagen}" alt="${data.nombre}">
                            </div>
                            <h2 class="portrait-name">${data.nombre}</h2>
                        </a>
                    `;
                });

                // Inyectamos las tarjetas borrando el mensaje de carga
                contenedor.innerHTML = htmlContent;

            } catch (error) {
                console.error("Error obteniendo documentos: ", error);
                mensajeCarga.innerText = "Error de conexión. No se pudieron cargar los registros.";
                mensajeCarga.style.color = "#f87171";
            }
        }

        // Ejecutar la función al abrir la página
        cargarPersonajes();
    </script>
</body>
</html>
