<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio de Personajes - ACCAR</title>
    <style>
        body {
            background: linear-gradient(180deg, #02040a 0%, #050b1a 100%);
            min-height: 100vh;
            margin: 0;
            padding: 80px 20px;
            color: #f5f2eb;
            font-family: Georgia, "Times New Roman", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .accar-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .accar-kicker {
            display: inline-block;
            font-family: sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #D4AF37;
            text-transform: uppercase;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 5px;
        }

        .accar-title {
            font-size: 42px;
            font-weight: normal;
            color: #ffffff;
            margin: 10px 0 0 0;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        .accar-divider {
            width: 60px;
            height: 2px;
            background: #D4AF37;
            margin: 20px auto 0;
            box-shadow: 0 0 10px #D4AF37;
        }

        /* --- Estilos del Acordeón --- */
        .accordion-container {
            width: 100%;
            max-width: 1100px; /* Un poco más ancho para albergar más tarjetas */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .accordion-item {
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            overflow: hidden;
            background: rgba(11, 22, 48, 0.4);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        .accordion-item.active {
            border-color: rgba(212, 175, 55, 0.6);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            background: rgba(11, 22, 48, 0.6);
        }

        .accordion-header {
            width: 100%;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
            border: none;
            color: #D4AF37;
            font-size: 20px;
            font-family: Georgia, serif;
            cursor: pointer;
            text-align: left;
            transition: background-color 0.2s ease;
        }

        .accordion-header:hover {
            background: rgba(212, 175, 55, 0.05);
        }

        .accordion-header .title-text {
            font-weight: normal;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }
        
        .accordion-header .subtitle-text {
            font-family: sans-serif;
            font-size: 12px;
            color: #94a3b8;
            margin-left: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .icon-toggle {
            font-family: monospace;
            font-size: 24px;
            font-weight: bold;
            color: #D4AF37;
            transition: transform 0.3s ease;
            width: 20px;
            text-align: center;
        }

        .accordion-item.active .icon-toggle {
            transform: rotate(45deg); /* Gira el + para que parezca un x (o se cambia a - vía JS) */
        }

        /* Contenido oculto del acordeón */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, padding 0.4s ease;
            padding: 0 30px; /* Padding lateral fijo, vertical animado */
        }

        .accordion-item.active .accordion-content {
            /* Se establece un max-height muy alto para permitir la expansión */
            max-height: 2000px; 
            padding: 30px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

        /* --- Estilos de la Cuadrícula Reducida --- */
        .accar-grid-container {
            display: grid;
            /* Hemos reducido minmax de 220px a 160px para que entren más por fila */
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 30px;
            width: 100%;
            justify-items: center;
        }

        .accar-portrait-card {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease, filter 0.3s ease;
            width: 100%;
            max-width: 180px; /* Reducido para encajar mejor */
        }

        .accar-portrait-card:hover {
            transform: translateY(-5px);
            filter: drop-shadow(0 10px 20px rgba(212, 175, 55, 0.2));
        }

        .portrait-frame {
            width: 100%;
            height: 280px; /* Altura reducida (antes 380px) para acomodar el nuevo ancho */
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 15px;
            background: transparent;
            border: none;
            box-shadow: none;
        }

        .portrait-frame img {
            width: auto;
            height: 100%;
            max-width: 100%;
            object-fit: contain;
            transition: transform 0.5s ease;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8));
        }

        .portrait-name {
            font-size: 18px; /* Reducido para acompañar a la imagen pequeña */
            color: #D4AF37;
            font-weight: normal;
            margin: 0;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
            text-align: center;
            border-bottom: 1px solid transparent;
            padding-bottom: 5px;
            transition: border-color 0.3s ease;
        }

        .accar-portrait-card:hover .portrait-name {
            border-color: rgba(212, 175, 55, 0.5);
        }

        .loading-text, .empty-text {
            color: #D4AF37;
            font-family: sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            padding: 20px 0;
            grid-column: 1 / -1; /* Para que ocupe todo el ancho de la grilla */
        }
        
        .empty-text {
            color: #64748b;
            font-size: 12px;
        }

    </style>
</head>
<body>

    <div class="accar-header">
        <span class="accar-kicker">Historia de la Salvación</span>
        <h1 class="accar-title">Directorio de Personajes</h1>
        <div class="accar-divider"></div>
    </div>

    <!-- Contenedor del Acordeón -->
    <div class="accordion-container" id="accordion-root">
        
        <!-- Bloque 1: Génesis -->
        <div class="accordion-item" id="bloque-genesis">
            <button class="accordion-header" onclick="toggleAccordion('bloque-genesis')">
                <div>
                    <span class="title-text">El Génesis</span>
                    <span class="subtitle-text">Los Patriarcas (Abraham, Isaac, Jacob, José)</span>
                </div>
                <span class="icon-toggle">+</span>
            </button>
            <div class="accordion-content">
                <div id="grid-genesis" class="accar-grid-container">
                    <p class="loading-text">Cargando archivo eclesial...</p>
                </div>
            </div>
        </div>

        <!-- Bloque 2: Éxodo -->
        <div class="accordion-item" id="bloque-exodo">
            <button class="accordion-header" onclick="toggleAccordion('bloque-exodo')">
                <div>
                    <span class="title-text">El Éxodo y La Ley</span>
                    <span class="subtitle-text">Moisés, Aarón, Josué</span>
                </div>
                <span class="icon-toggle">+</span>
            </button>
            <div class="accordion-content">
                <div id="grid-exodo" class="accar-grid-container">
                    <p class="empty-text">No hay registros disponibles en esta sección por el momento.</p>
                </div>
            </div>
        </div>
        
        <!-- Bloque 3: Jueces (Preparado para el futuro) -->
        <div class="accordion-item" id="bloque-jueces">
            <button class="accordion-header" onclick="toggleAccordion('bloque-jueces')">
                <div>
                    <span class="title-text">La Era de los Jueces</span>
                    <span class="subtitle-text">Gedeón, Sansón, Samuel</span>
                </div>
                <span class="icon-toggle">+</span>
            </button>
            <div class="accordion-content">
                <div id="grid-jueces" class="accar-grid-container">
                    <p class="empty-text">No hay registros disponibles en esta sección por el momento.</p>
                </div>
            </div>
        </div>
        
        <!-- Bloque 4: Reyes (Preparado para el futuro) -->
        <div class="accordion-item" id="bloque-reyes">
            <button class="accordion-header" onclick="toggleAccordion('bloque-reyes')">
                <div>
                    <span class="title-text">La Monarquía</span>
                    <span class="subtitle-text">Saúl, David, Salomón</span>
                </div>
                <span class="icon-toggle">+</span>
            </button>
            <div class="accordion-content">
                <div id="grid-reyes" class="accar-grid-container">
                    <p class="empty-text">No hay registros disponibles en esta sección por el momento.</p>
                </div>
            </div>
        </div>

    </div>

    <!-- SDK de Firebase modular (CDN) -->
    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Configuración exacta
        const firebaseConfig = {
            apiKey: "AIzaSyDSCSWYM5dgkIfVK-uBe1oWkeU7se4fvFg",
            authDomain: "accar-web.firebaseapp.com",
            projectId: "accar-web",
            storageBucket: "accar-web.firebasestorage.app",
            messagingSenderId: "249370548582",
            appId: "1:249370548582:web:6b35298df41771113910a7"
        };

        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
        const db = getFirestore(app);

        // --- Función para la interactividad del Acordeón ---
        window.toggleAccordion = function(idBloque) {
            const bloque = document.getElementById(idBloque);
            const icono = bloque.querySelector('.icon-toggle');
            
            // Si ya está activo, lo cerramos
            if (bloque.classList.contains('active')) {
                bloque.classList.remove('active');
                icono.innerText = "+";
                icono.style.transform = "rotate(0deg)";
            } else {
                // Opcional: Cerrar los demás antes de abrir este (descomenta el forEach si lo deseas)
                /*
                document.querySelectorAll('.accordion-item').forEach(item => {
                    item.classList.remove('active');
                    item.querySelector('.icon-toggle').innerText = "+";
                    item.querySelector('.icon-toggle').style.transform = "rotate(0deg)";
                });
                */
                
                // Abrir el seleccionado
                bloque.classList.add('active');
                icono.innerText = "-";
                icono.style.transform = "rotate(180deg)";
            }
        };

        async function cargarPersonajes() {
            // Actualmente cargaremos todos en Génesis, pero más adelante 
            // podrás filtrar la consulta en Firebase según el libro.
            const gridGenesis = document.getElementById('grid-genesis');

            try {
                const querySnapshot = await getDocs(collection(db, "directorio_biblico", "personajes", "registros"));
                let htmlContent = "";

                if (querySnapshot.empty) {
                    htmlContent = `<p class="empty-text">No se encontraron registros en la base de datos.</p>`;
                } else {
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        const imagen = `/assets/img/${doc.id}.png`;
                        
                        htmlContent += `
                            <a href="#" onclick="event.preventDefault(); localStorage.setItem('personajeSeleccionado', '${doc.id}'); loadView('/views/directorio_biblico/personaje.html');" class="accar-portrait-card">
                                <div class="portrait-frame">
                                    <img src="${imagen}" alt="${data.nombre || 'Personaje'}">
                                </div>
                                <h2 class="portrait-name">${data.nombre || 'Desconocido'}</h2>
                            </a>
                        `;
                    });
                }

                // Inyectamos las tarjetas solo en el panel de Génesis
                gridGenesis.innerHTML = htmlContent;
                
                // Abrimos el primer acordeón por defecto para que el usuario vea contenido inmediato
                window.toggleAccordion('bloque-genesis');

            } catch (error) {
                console.error("Error obteniendo documentos: ", error);
                gridGenesis.innerHTML = `<p class="loading-text" style="color: #f87171;">Error de conexión. No se pudieron cargar los registros.</p>`;
            }
        }

        // Ejecutar la función al abrir la página
        cargarPersonajes();
    </script>
</body>
</html>
