<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha del Personaje - ACCAR</title>
    <style>
        :root {
            --primary: #d4af37;
            --primary-light: #f3c93f;
            --secondary: #0a0e17;
            --accent: #8a7322;
            --text-main: #e2e8f0;
            --card-bg: #111827;
            --success: #4ade80;
            --error: #f87171;
        }

        body {
            font-family: 'Georgia', Times, serif;
            color: var(--text-main);
            background-color: var(--secondary);
            line-height: 1.8;
            margin: 0;
            padding: 0;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .no-break { white-space: nowrap; }

        .hero-section {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 0;
            background-color: transparent;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 40px;
            gap: 40px;
        }

        .hero-image {
            flex: 1;
            text-align: left;
            display: flex;
            justify-content: flex-start;
        }

        .hero-image img {
            max-width: 100%;
            height: auto;
            max-height: 380px;
            object-fit: contain;
            filter: drop-shadow(0px 10px 25px rgba(0, 0, 0, 0.8));
        }

        .hero-text {
            flex: 1.5;
            text-align: left;
        }

        .hero-text h1 {
            margin: 0;
            font-size: 3.5em;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .hero-text .subtitle {
            color: #94a3b8;
            font-style: italic;
            font-size: 1.3em;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .hero-section { flex-direction: column; text-align: center; gap: 20px; }
            .hero-image, .hero-text { text-align: center; justify-content: center; }
        }

        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 8px; margin-top: 40px; font-size: 1.5em; }

        .ficha-tecnica {
            background-color: var(--card-bg); padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-left: 5px solid var(--primary);
        }
        .ficha-tecnica ul { list-style: none; padding: 0; margin: 0; }
        .ficha-tecnica li { margin-bottom: 12px; }
        strong { color: var(--primary); }
        p { text-align: justify; margin-bottom: 20px; font-size: 1.05em; color: #cbd5e1; }

        /* Botones e Invitación */
        .cta-invitation {
            background-color: var(--card-bg); border: 1px solid var(--accent);
            text-align: center; padding: 40px; border-radius: 8px;
            margin-top: 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .cta-invitation h3 { color: var(--primary); font-size: 1.8em; margin-top: 0; }
        .cta-invitation p { color: #94a3b8; margin-bottom: 30px; }
        
        .btn-elegant {
            background-color: transparent; color: var(--primary); 
            border: 2px solid var(--primary);
            padding: 15px 40px; font-size: 1.2em; font-family: 'Georgia', serif;
            border-radius: 30px; cursor: pointer; transition: all 0.3s;
        }
        .btn-elegant:hover { background-color: var(--primary); color: var(--secondary); box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(10, 14, 23, 0.5), rgba(10, 14, 23, 0.5)), url('../../assets/img/bg_apologetica.webp');
            background-size: cover;
            background-position: center;
            backdrop-filter: blur(8px);
            z-index: 1000; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { display: flex; opacity: 1; }

        .modal-card {
            background-color: var(--card-bg);
            width: 90%; max-width: 600px;
            border-radius: 12px; padding: 40px; position: relative;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6); transform: translateY(20px);
            transition: transform 0.3s ease; max-height: 90vh; overflow-y: auto;
            border: 1px solid var(--accent);
        }
        .modal-overlay.active .modal-card { transform: translateY(0); }
        
        .close-btn {
            position: absolute; top: 15px; right: 20px; font-size: 28px;
            cursor: pointer; color: #64748b; transition: color 0.2s;
        }
        .close-btn:hover { color: var(--primary); }

        .quiz-status { font-family: sans-serif; font-size: 0.85em; font-weight: bold; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; text-align: center;}
        .question-text { font-size: 1.3em; color: var(--text-main); font-weight: bold; margin-bottom: 30px; text-align: center; line-height: 1.4; }

        .options-container { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            background-color: rgba(255, 255, 255, 0.03); border: 1px solid var(--accent); padding: 15px 20px;
            border-radius: 8px; text-align: left; font-size: 1.05em; font-family: inherit;
            color: var(--text-main); cursor: pointer; transition: all 0.2s;
        }
        .option-btn:hover:not(:disabled) { border-color: var(--primary); background-color: rgba(212, 175, 55, 0.1); }
        .option-btn:disabled { cursor: default; }

        .correct-ans { background-color: rgba(74, 222, 128, 0.1) !important; border-color: var(--success) !important; color: var(--success) !important; font-weight: bold; }
        .wrong-ans { background-color: rgba(248, 113, 113, 0.1) !important; border-color: var(--error) !important; color: var(--error) !important; opacity: 0.7; }

        .justification-box {
            display: none; background-color: rgba(0,0,0,0.2); padding: 20px;
            border-radius: 4px;
            margin-top: 25px; font-size: 0.95em; box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
            animation: slideDown 0.3s ease-out;
            color: #cbd5e1;
            border-left: 4px solid var(--primary);
        }

        .next-btn {
            display: none; width: 100%; background-color: var(--primary); color: var(--secondary);
            border: none; padding: 15px; font-size: 1.1em; border-radius: 8px;
            margin-top: 20px; cursor: pointer; font-family: 'Georgia', serif; font-weight: bold;
        }
        .next-btn:hover { background-color: var(--primary-light); }

        .results-view { display: none; text-align: center; }
        .results-view h2 { border: none; margin-top: 0; color: var(--primary); }
        .score-circle {
            width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 2em; font-weight: bold; margin: 0 auto 20px; color: var(--primary);
            background-color: rgba(212, 175, 55, 0.05);
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        
        <div style="margin-bottom: 25px;">
            <a href="#" onclick="event.preventDefault(); loadView('/views/directorio_biblico/directorio_personajes.html');" style="color: #D4AF37; text-decoration: none; font-size: 12px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-family: sans-serif;">
                ⮜ Volver al Directorio
            </a>
        </div>

        <header class="hero-section">
            <div class="hero-image">
                <img src="" alt="Ilustración del Personaje">
            </div>
            <div class="hero-text">
                <h1>Cargando...</h1>
                <div class="subtitle"></div>
            </div>
        </header>

        <main id="main-content">
            <p style="text-align: center; color: var(--primary);">Conectando con el archivo eclesial...</p>
        </main>

        <div class="cta-invitation">
            <h3>¿Profundizaste en la lectura?</h3>
            <p>Te invitamos a evaluar tu comprensión doctrinal y eclesiológica sobre este patriarca.</p>
            <button class="btn-elegant" onclick="abrirModal()">Realizar Test Interactivo</button>
        </div>

    </div>

    <div class="modal-overlay" id="quizModal">
        <div class="modal-card">
            <span class="close-btn" onclick="cerrarModal()">&times;</span>
            
            <div id="quiz-view">
                <div class="quiz-status">Pregunta <span id="q-num">1</span> de 3</div>
                <div class="question-text" id="q-text"></div>
                <div class="options-container" id="options-box"></div>
                <div class="justification-box" id="just-box">
                    <strong>Fundamento Teológico:</strong> <span id="just-text"></span>
                </div>
                <button class="next-btn" id="next-btn" onclick="siguientePregunta()">Siguiente Pregunta</button>
            </div>

            <div class="results-view" id="results-view">
                <h2>Evaluación Finalizada</h2>
                <div class="score-circle"><span id="final-score">0</span>/<span id="total-q">3</span></div>
                <p id="result-msg" style="font-size: 1.1em; margin-bottom: 30px;"></p>
                <button class="btn-elegant" style="width: 100%;" onclick="cerrarModal()">Volver al Artículo</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSCSWYM5dgkIfVK-uBe1oWkeU7se4fvFg",
            authDomain: "accar-web.firebaseapp.com",
            projectId: "accar-web",
            storageBucket: "accar-web.firebasestorage.app",
            messagingSenderId: "249370548582",
            appId: "1:249370548582:web:6b35298df41771113910a7"
        };

        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
        const db = getFirestore(app);

        let quizData = [];
        let index = 0;
        let score = 0;

        async function cargarDatos() {
            const personajeId = localStorage.getItem('personajeSeleccionado') || 'abraham'; 
            try {
                const docRef = doc(db, "directorio_biblico", "personajes", "registros", personajeId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const p = docSnap.data();
                    
                    document.querySelector('.hero-text h1').innerText = p.titulo || p.nombre || "Personaje";
                    document.querySelector('.hero-text .subtitle').innerText = p.subtitulo || '';
                    document.querySelector('.hero-image img').src = `/assets/img/${personajeId}.png`;

                    const f_nombre = (p.ficha_tecnica && p.ficha_tecnica.nombre) ? p.ficha_tecnica.nombre : "Dato no disponible";
                    const f_significado = (p.ficha_tecnica && p.ficha_tecnica.significado) ? p.ficha_tecnica.significado : "Dato no disponible";
                    const f_linaje = (p.ficha_tecnica && p.ficha_tecnica.linaje) ? p.ficha_tecnica.linaje : "Dato no disponible";
                    const f_referencia = (p.ficha_tecnica && p.ficha_tecnica.referencia) ? p.ficha_tecnica.referencia : "Dato no disponible";
                    
                    const relato = p.relato_biblico || "Relato no disponible.";
                    const importancia = p.importancia_teologica || "Importancia no disponible.";

                    document.getElementById('main-content').innerHTML = `
                        <h2>1. Ficha Técnica</h2>
                        <div class="ficha-tecnica">
                            <ul>
                                <li><strong>Nombre:</strong> ${f_nombre}</li>
                                <li><strong>Significado Espiritual:</strong> ${f_significado}</li>
                                <li><strong>Linaje:</strong> ${f_linaje}</li>
                                <li><strong>Capítulos Claves:</strong> ${f_referencia}</li>
                            </ul>
                        </div>
                        <h2>2. El Relato Bíblico (Hechos Históricos)</h2>
                        <p>${relato.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>')}</p>
                        <h2>3. Importancia en el Plan de Salvación (Cristocéntrico y Eclesiológico)</h2>
                        <p>${importancia.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>')}</p>
                    `;

                    quizData = p.test || [];
                }
            } catch (error) {
                console.error("Error al cargar personaje:", error);
                document.getElementById('main-content').innerHTML = `<p style="color: red;">Error al conectar con la base de datos.</p>`;
            }
        }

        window.abrirModal = function() {
            if(quizData.length === 0) { alert("Test no disponible para este personaje."); return; }
            index = 0; score = 0;
            document.getElementById('quiz-view').style.display = 'block';
            document.getElementById('results-view').style.display = 'none';
            document.getElementById('quizModal').classList.add('active');
            window.cargarPregunta();
        };

        window.cerrarModal = function() { document.getElementById('quizModal').classList.remove('active'); };

        window.cargarPregunta = function() {
            const q = quizData[index];
            document.getElementById('q-num').innerText = index + 1;
            document.getElementById('q-text').innerText = q.pregunta || q.question;
            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = '';
            document.getElementById('just-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';

            const opciones = q.opciones || q.options;
            opciones.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; btn.innerText = opt;
                btn.onclick = () => window.seleccionar(i, btn);
                optionsBox.appendChild(btn);
            });
        };

        window.seleccionar = function(seleccionado, btnEl) {
            const q = quizData[index];
            const correcta = q.correcta !== undefined ? q.correcta : q.correct;
            const botones = document.querySelectorAll('.option-btn');
            botones.forEach(b => b.disabled = true);

            if (seleccionado === correcta) {
                btnEl.classList.add('correct-ans'); score++;
            } else {
                btnEl.classList.add('wrong-ans');
                botones[correcta].classList.add('correct-ans');
            }

            document.getElementById('just-text').innerText = q.justificacion;
            document.getElementById('just-box').style.display = 'block';
            document.getElementById('next-btn').innerText = (index === quizData.length - 1) ? "Ver Calificación" : "Siguiente Pregunta";
            document.getElementById('next-btn').style.display = 'block';
        };

        window.siguientePregunta = function() {
            index++;
            if (index < quizData.length) window.cargarPregunta();
            else window.mostrarResultados();
        };

        window.mostrarResultados = function() {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('results-view').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            document.getElementById('total-q').innerText = quizData.length;
            const msg = document.getElementById('result-msg');
            if (score === quizData.length) { msg.innerHTML = "<strong>¡Excelente!</strong> Tienes una base doctrinal sólida."; msg.style.color = "var(--success)"; }
            else if (score > 0) { msg.innerHTML = "<strong>¡Muy bien!</strong> Repasa algunos detalles teológicos."; msg.style.color = "#d84315"; }
            else { msg.innerHTML = "Te sugerimos repasar la sección eclesiológica."; msg.style.color = "var(--error)"; }
        };

        cargarDatos();
    </script>
</body>
</html>
