                "correcta": 1,
                "justificacion": "San Agustín y otros Padres asocian las zarzas que atrapaban la cabeza del carnero con la corona de espinas de Cristo, consolidando la imagen del Cordero sustitutorio que muere para que el hombre (representado en Isaac) viva."
              },
              {
                "pregunta": "¿A qué sacramento de la Iglesia Católica apunta directamente la prefiguración del sacrificio de Isaac y el Cordero sustitutorio?",
                "opciones": ["A) El Sacramento del Orden Sacerdotal.", "B) El Sacramento del Matrimonio.", "C) El Sacramento de la Sagrada Eucaristía.", "D) El Sacramento de la Unción de los Enfermos."],
                "correcta": 2,
                "justificacion": "La Eucaristía es el memorial del sacrificio perfecto de Cristo. El sacrificio en Moria es citado en la liturgia tradicional de la Iglesia (\"el sacrificio de tu siervo Abraham\") como el tipo antiguo del único sacrificio salvífico que hoy se ofrece en el altar."
              },
              {
                "pregunta": "Eclesiológicamente, la transmisión inquebrantable de la bendición de Abraham a Isaac, y de este a Jacob, prefigura en el Nuevo Testamento:",
                "opciones": ["A) La Sucesión Apostólica y la entrega de las llaves a Pedro para gobernar la Iglesia.", "B) La doctrina de la \"Sola Scriptura\" donde no hace falta la jerarquía.", "C) La separación entre la fe y las obras.", "D) La abolición completa del sacerdocio ministerial."],
                "correcta": 0,
                "justificacion": "La bendición patriarcal era una transmisión visible de autoridad y gracia. En la Nueva Alianza, Cristo transfiere esta autoridad divinamente garantizada (las llaves de Is 22) a San Pedro y a sus sucesores (CIC 880), asegurando la perpetuidad de la verdadera fe."
              }
            ]
          }
        ];
        const btnSubir = document.getElementById('btnSubir');
        const mensajeDiv = document.getElementById('mensaje');

        btnSubir.addEventListener('click', async () => {
            btnSubir.disabled = true;
            btnSubir.innerText = "Subiendo datos...";
            mensajeDiv.innerHTML = "";

            try {
                // Iteramos sobre cada personaje para subirlo a la ruta: directorio_biblico/personajes/ID_DEL_PERSONAJE
                for (const personaje of personajes) {
                    const docRef = doc(db, 'directorio_biblico', 'personajes', 'registros', personaje.id);
                    // Usamos la destructuración para subir los datos sin el campo "id" dentro del documento
                    const { id, ...datosPersonaje } = personaje;
                    await setDoc(docRef, datosPersonaje);
                }
                
                mensajeDiv.innerHTML = "¡Éxito! Los 3 personajes han sido guardados en Firestore.";
                mensajeDiv.className = "exito";
                btnSubir.innerText = "Datos sincronizados";
                
            } catch (error) {
                console.error("Error al subir los documentos: ", error);
                mensajeDiv.innerHTML = "Error al conectar con la base de datos. Revisa la consola (F12).";
                mensajeDiv.className = "error";
                btnSubir.disabled = false;
                btnSubir.innerText = "Reintentar";
            }
        });
    </script>
